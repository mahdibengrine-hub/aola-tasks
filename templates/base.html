<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<title>AOLA Tasks{% block title %}{% endblock %}</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
<meta name="theme-color" content="#0f766e">
</head>
<body>
<header class="topbar">
  <div class="brand">AOLA Tasks</div>
  <nav class="topnav desktop-only">{% block topnav %}{% endblock %}</nav>
</header>
<main>
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
      <div class="flashes">
        {% for category, msg in messages %}
        <div class="flash flash-{{ category }}">{{ msg }}</div>
        {% endfor %}
      </div>
    {% endif %}
  {% endwith %}
  {% block content %}{% endblock %}
</main>
<nav class="bottomnav mobile-only">{% block bottomnav %}{% endblock %}</nav>
<script>
// Toggle "Transfert ?" : remplace Titre par N° du transfert et change le label Lieu.
(function(){
  function sync(form){
    var cb = form.querySelector('.transfer-toggle');
    if (!cb) return;
    var titleBox = form.querySelector('.field-title');
    var transBox = form.querySelector('.field-transfer');
    var titleInput = titleBox ? titleBox.querySelector('input') : null;
    var transInput = transBox ? transBox.querySelector('input') : null;
    var locLabel = form.querySelector('.loc-label');
    var locPh    = form.querySelector('.loc-placeholder');
    function apply(){
      var on = cb.checked;
      if (titleBox) titleBox.hidden = on;
      if (transBox) transBox.hidden = !on;
      if (titleInput) titleInput.required = !on;
      if (transInput) transInput.required = on;
      if (locLabel) locLabel.textContent = on ? 'Récupérer à…' : 'Lieu';
      if (locPh)    locPh.textContent    = on ? '— Récupérer à… —' : '— Choisis un lieu —';
    }
    cb.addEventListener('change', apply);
    apply();
  }
  document.querySelectorAll('form.task-form').forEach(sync);
})();
</script>
</body>
</html>
