<li class="task">
  <div class="task-body">
    <details>
      <summary>
        <span class="task-title">{{ t.title }}</span>
        {% if t.due_date %}<span class="task-meta"> · {{ t.due_date }}</span>{% endif %}
        {% if t.recurring_id %}<span class="badge">récurrente</span>{% endif %}
      </summary>
      <form method="POST" action="{{ url_for('admin_edit', token=token, tid=t.id) }}" class="row" style="margin-top:8px">
        <input name="title" value="{{ t.title }}" required style="flex:2">
        <input type="date" name="due_date" value="{{ t.due_date or '' }}" style="flex:1">
        <button type="submit" class="btn-ghost">Enregistrer</button>
      </form>
    </details>
  </div>
  <div class="task-actions">
    <form method="POST" action="{{ url_for('admin_delete', token=token, tid=t.id) }}" onsubmit="return confirm('Supprimer ?')" style="display:inline">
      <button type="submit" class="btn-danger">Suppr</button>
    </form>
  </div>
</li>
